name: OpenRouter to Gmail

on:
  workflow_dispatch:
    inputs:
      model_id:
        description: 'OpenRouter Model ID'
        required: true
        default: 'google/gemini-pro-1.5'
      question:
        description: 'Your Question'
        required: true

jobs:
  ask-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Get Response from OpenRouter
        id: openrouter
        run: |
          # Get the response from OpenRouter
          RESPONSE=$(curl -s https://openrouter.ai/api/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.OPENROUTER_API_KEY }}" \
            -d '{
              "model": "${{ github.event.inputs.model_id }}",
              "messages": [{"role": "user", "content": "${{ github.event.inputs.question }}"}]
            }')
          
          # Extract the answer text
          ANSWER=$(echo "$RESPONSE" | jq -r '.choices[0].message.content')
          
          # This special syntax allows multi-line text to be saved to GitHub Environment
          echo "AI_ANSWER<<EOF" >> $GITHUB_ENV
          echo "$ANSWER" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Send Email via Gmail
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "AI Answer: ${{ github.event.inputs.question }}"
          to: ${{ secrets.GMAIL_USER }}
          from: GitHub OpenRouter Bot
          body: |
            QUESTION: 
            ${{ github.event.inputs.question }}

            ------------------------------------------------
            AI ANSWER:
            ${{ env.AI_ANSWER }}
            ------------------------------------------------

            Model Used: ${{ github.event.inputs.model_id }}
