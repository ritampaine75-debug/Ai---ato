# .github/workflows/generate_config.yml
name: Generate WebDB Config

on:
  workflow_dispatch: # শুধুমাত্র ম্যানুয়ালি রান করার জন্য

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Make Magic Config
        run: |
          # আপনার টোকেন এবং রিপো তথ্য
          # সাবধান: টোকেনটি এখানে সরাসরি লিখবেন না, এটি GitHub Secrets এ রাখা উচিত।
          # কিন্তু আপনার আইডিয়া অনুযায়ী আমরা এটি আপাতত এভাবেই করছি।
          # নিরাপত্তার জন্য, এই অ্যাকশনটি রান করার পর টোকেনটি এখান থেকে মুছে দেবেন।
          
          PAT_TOKEN="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"
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          BRANCH="main" # বা আপনার মেইন ব্রাঞ্চের নাম

          # সব তথ্য মিলে একটি JSON তৈরি এবং তা Base64 এ এনকোড করা
          RAW_CONFIG="{\"token\":\"$PAT_TOKEN\",\"owner\":\"$OWNER\",\"repo\":\"$REPO\",\"branch\":\"$BRANCH\"}"
          MAGIC_CONFIG=$(echo -n "$RAW_CONFIG" | base64)

          echo "--------------------------------------------------"
          echo "আপনার ম্যাজিক কনফিগটি নিচে দেওয়া হলো।"
          echo "এটি কপি করে আপনার ওয়েবসাইটের কোডে ব্যবহার করুন।"
          echo "সাবধান: এটি কাউকে দেখাবেন না!"
          echo "--------------------------------------------------"
          echo ""
          echo "$MAGIC_CONFIG"
          echo ""
          echo "--------------------------------------------------"
          
