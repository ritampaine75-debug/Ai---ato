name: WhatsApp Bot QR Generator

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable libnss3 libatk-bridge2.0-0
          npm install

      - name: Run Bot
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          AI_MODEL_NAME: ${{ secrets.AI_MODEL_NAME }}
        run: node index.js || echo "Bot stopped"

      - name: Upload QR Code to Repository
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add qr.png session/
          git commit -m "New QR Code generated" || exit 0
          git push
